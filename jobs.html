	<body>
		<header>

			<a href="jobs.html">Jobs</a>&nbsp;

		<main>
			<h2>Jobs at JavaJam</h2>
			<p>Want to work at JavaJam? Fill out the form below to start your application. Required fields are mark with an asterisk(*).</p>
			<form method="post", action="/action_page.js">
				<label >*Name</label><br>
				<input type="text" placeholder="Enter your name"><br>
				<label >*Email</label><br>
				<input type="email"><br>
				<label >*Experience</label><br>
				<textarea rows="8" cols="40"></textarea><br>
				<label>Select job position</label>
				<select>
					<option value="barista">Barista</option>
				</select><br>
				<br>
				<label>Preferred Interview Date and Time:</label><br>
				<input type="datetime-local"><br>
				<br>
				<label>Upload your photo:</label>
				<input type="file" name="" value=""><br>
				<br>
				<button type="submit">Apply Now</button>
			</form>
		</main>
		<footer>
			<small>
				<i>
					Copyright © 2025 JavaJam Coffee House<br>

				</i>
			</small>
