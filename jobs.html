<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>JavaJam Coffee House</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
	</head>
	<body>
		<div class="container border my-4">
			<header class="d-flex align-items-center text-center my-3 border">
				<img src="./images/javajamlogo.jpg" alt="javajam logo" class="me-3">
				<h1>JavaJam Coffee House</h1>
			</header>
			<nav class="container text-center my-3 py-3 border">
				<div class="row">
					<a class="col text-decoration-none fw-bold" href="index.html">Home</a>&nbsp;
					<a class="col text-decoration-none fw-bold" href="menu.html">Menu</a>&nbsp;
					<a class="col text-decoration-none fw-bold" href="music.html">Music</a>&nbsp;
					<a class="col text-decoration-none fw-bold" href="jobs.html">Jobs</a>&nbsp;
				</div>
			</nav>
			<main class="p-5">
				<h2>Jobs at JavaJam</h2>
				<p>Want to work at JavaJam? Fill out the form below to start your application. Required fields are mark with an asterisk(*).</p>
				<form method="post" action="/action_page.js" class="row g-3">
					<div class="col-md-6">
						<label class="form-label fw-bold small text-uppercase text-muted">* Name</label>
						<input type="text" class="form-control" placeholder="Enter your name" required>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold small text-uppercase text-muted">* Email</label>
						<input type="email" class="form-control" placeholder="email@address.com" required>
					</div>

					<div class="col-12">
						<label class="form-label fw-bold small text-uppercase text-muted">Select job position</label>
						<select class="form-select">
							<option value="barista">Barista</option>
							<option value="server">Server</option>
							<option value="manager">Manager</option>
						</select>
					</div>

					<div class="col-12">
						<label class="form-label fw-bold small text-uppercase text-muted">* Experience</label>
						<textarea class="form-control" rows="4" placeholder="Tell us about your background..." required></textarea>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold small text-uppercase text-muted">Interview Date/Time</label>
						<input type="datetime-local" class="form-control">
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold small text-uppercase text-muted">Upload Photo</label>
						<input type="file" class="form-control">
					</div>

					<div class="col-12 mt-4">
						<button type="submit" class="btn btn-dark px-4">Apply Now</button>
					</div>
				</form>

			</main>
			<hr>
			<footer class="container fst-italic my-3">
				Copyright © 2025 JavaJam Coffee House<br>
				<a href="#">amin@kafri.com</a>
			</footer>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
	</body>
</html>
